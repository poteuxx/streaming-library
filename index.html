<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poteuxx Streaming Hub</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:#0b0c0f;
  color:white;
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:#020617;
  border-right:1px solid rgba(255,255,255,0.06);
  padding:20px;
  position:fixed;
  height:100vh;
}

.logo{
  font-size:22px;
  font-weight:900;
  margin-bottom:30px;
  background:linear-gradient(90deg,#60a5fa,#3b82f6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* MAIN */

.main{
  margin-left:260px;
  padding:30px;
  width:100%;
}

/* SEARCH */

.search{
  max-width:700px;
  margin-bottom:20px;
}

.search input{
  width:100%;
  height:55px;
  border-radius:999px;
  border:1px solid #1f2937;
  background:#0f172a;
  color:white;
  padding:0 20px;
  outline:none;
}

/* UPLOAD AREA */

.upload-box{
  border:2px dashed #334155;
  border-radius:16px;
  padding:25px;
  text-align:center;
  margin-bottom:25px;
  background:rgba(15,23,42,0.4);
  transition:.2s;
}

.upload-box.dragover{
  border-color:#3b82f6;
  background:rgba(59,130,246,0.1);
}

.upload-box input{
  display:none;
}

.upload-btn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  cursor:pointer;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}

/* CARD */

.card{
  position:relative;
  background:#0f172a;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}

.card:hover{
  transform:scale(1.07);
  z-index:5;
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

/* PREVIEW */

.preview{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

/* TITLE */

.card h3{
  padding:10px;
  font-size:14px;
}

/* MODAL */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  width:90%;
  max-width:900px;
  background:#020617;
  border-radius:12px;
  overflow:hidden;
}

video{
  width:100%;
}

.close{
  position:absolute;
  right:15px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Poteuxx</div>
</div>

<div class="main">

  <!-- SEARCH -->
  <div class="search">
    <input id="searchInput" placeholder="Rechercher...">
  </div>

  <!-- DRAG & DROP UPLOAD -->
  <div class="upload-box" id="dropZone">

    <p>📁 Glisse & dépose une vidéo ici</p>
    <p>ou</p>

    <input type="file" id="fileInput" accept="video/*">

    <button class="upload-btn" onclick="fileInput.click()">
      Choisir une vidéo
    </button>

  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closePlayer()">✖</span>
    <video id="player" controls></video>
  </div>
</div>

<script>

/* DATABASE (IndexedDB simple via memory fallback) */

let items = [];

/* RENDER */

function render(){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  items.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.thumb}">
      <video class="preview" muted loop playsinline></video>
      <h3>${item.name}</h3>
    `;

    const video = card.querySelector(".preview");
    const img = card.querySelector("img");

    video.src = item.video;

    /* 0.8s hover preview */
    let timer;

    card.addEventListener("mouseenter", () => {

      timer = setTimeout(() => {
        img.style.display = "none";
        video.style.display = "block";
        video.play().catch(()=>{});
      }, 800);

    });

    card.addEventListener("mouseleave", () => {
      clearTimeout(timer);
      video.pause();
      video.currentTime = 0;
      video.style.display = "none";
      img.style.display = "block";
    });

    card.onclick = () => openPlayer(item.video);

    grid.appendChild(card);

  });

}

/* UPLOAD HANDLER */

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

fileInput.addEventListener("change", handleFile);

/* DRAG EVENTS */

dropZone.addEventListener("dragover", e=>{
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e=>{
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handleFile(e.dataTransfer);
});

/* FILE PROCESS */

function handleFile(e){

  const file = e.files ? e.files[0] : e.target.files[0];

  if(!file) return;

  const url = URL.createObjectURL(file);

  const item = {
    name: file.name,
    video: url,
    thumb: "https://images.unsplash.com/photo-1524985069026-dd778a71c7b4"
  };

  items.push(item);
  render();
}

/* MODAL */

function openPlayer(src){
  document.getElementById("player").src = src;
  document.getElementById("modal").style.display = "flex";
}

function closePlayer(){
  const p = document.getElementById("player");
  p.pause();
  p.src = "";
  document.getElementById("modal").style.display = "none";
}

/* INIT */

render();

</script>

</body>
</html>
