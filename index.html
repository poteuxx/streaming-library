<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poteuxx Streaming Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0b0c0f;
    --bg-card: #15181f;
    --bg-header: rgba(11, 12, 15, 0.85);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text-main: #ffffff;
    --text-muted: #94a3b8;
    --card-radius: 12px;
    --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
  }

  body {
    background: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CUSTOM SCROLLBAR */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-main); }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* HEADER / NAVBAR */
  header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: var(--bg-header);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -1.5px;
    background: linear-gradient(165deg, #ff1e27 0%, #e50914 25%, #83040a 50%, #e50914 75%, #b20710 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    transition: var(--transition);
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
    clip-path: ellipse(120% 100% at 50% 0%); /* Netflix Arc */
  }
  
  .logo:hover {
    filter: brightness(1.2) drop-shadow(0 0 8px rgba(229, 9, 20, 0.6));
    transform: perspective(500px) rotateX(10deg);
  }

  .nav-links {
    display: flex;
    gap: 20px;
  }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: var(--transition);
    cursor: pointer;
  }

  .nav-links a:hover, .nav-links a.active {
    color: var(--text-main);
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* CENTRAL BRAND LOGO */
  .main-brand-logo {
    position: absolute;
    left: 50%;
    transform: translateX(-50%) scaleY(1.4) perspective(500px) rotateX(5deg);
    text-align: center;
    font-size: 16px;
    font-weight: 900;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase;
    line-height: 0.9;
    letter-spacing: 2px;
    
    /* Netflix 3D Ribbon / Faceted Colors */
    background: linear-gradient(165deg, 
      #ff1e27 0%, 
      #e50914 20%, 
      #83040a 40%, 
      #e50914 60%, 
      #b20710 80%, 
      #83040a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* Netflix Arc */
    clip-path: ellipse(150% 100% at 50% 0%);
    
    filter: drop-shadow(0px 4px 5px rgba(0, 0, 0, 0.8)) drop-shadow(0px 0px 2px rgba(229, 9, 20, 0.3));
    pointer-events: none;
    z-index: 10;
  }
  .main-brand-logo span {
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.9;
  }

  /* CUSTOM SCROLLBAR */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg-main);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  /* SEARCH BARR */
  .search-container {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 8px 16px 8px 36px;
    border-radius: 99px;
    font-size: 14px;
    width: 250px;
    outline: none;
    transition: var(--transition);
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 1;
    line-clamp: 1;
    overflow: hidden;
  }

  .search-input:focus {
    background: rgba(255,255,255,0.12);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
  }

  .search-icon {
    position: absolute;
    left: 12px;
    width: 16px;
    height: 16px;
    fill: var(--text-muted);
  }

  /* LANGUAGE TOGGLE */
  .lang-toggle {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: var(--transition);
  }
  
  .lang-toggle:hover {
    background: rgba(255,255,255,0.2);
  }

  /* HERO SECTION */
  .hero {
    position: relative;
    width: 100%;
    height: 70vh;
    min-height: 500px;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-end;
    padding: 80px 40px 150px; /* Increased bottom padding to avoid overlap with rows */
    transition: background-image 1s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }

  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, var(--bg-main) 0%, rgba(11,12,15,0.4) 50%, rgba(11,12,15,0.8) 100%);
    z-index: 2;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 10;
    max-width: 600px;
  }

  .hero-title {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 15px;
    text-shadow: 0 4px 12px rgba(0,0,0,0.5);
  }

  .hero-desc {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 25px;
    line-height: 1.5;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .hero-btn {
    background: var(--text-main);
    color: black;
    border: none;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
  }

  .hero-btn:hover {
    background: rgba(255,255,255,0.8);
    transform: scale(1.05);
  }

  .hero-btn-secondary {
    background: rgba(109, 109, 110, 0.7);
    color: white;
  }
  .hero-btn-secondary:hover {
    background: rgba(109, 109, 110, 0.4);
  }

  .sound-indicator {
    position: absolute;
    bottom: 150px;
    right: 40px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  /* MAIN CONTAINER */
  .container {
    padding: 0 40px 40px;
    position: relative;
    z-index: 5;
    margin-top: -100px;
  }

  /* ROWS & CAROUSELS */
  .content-row {
    margin-bottom: 40px;
    position: relative;
  }

  .row-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 15px;
    color: var(--text-main);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  .row-inner {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 15px 4px;
    scroll-behavior: smooth;
    scrollbar-width: none; 
  }

  .row-inner::-webkit-scrollbar {
    display: none;
  }

  /* GENRE FILTERS */
  .genres {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
  }

  .genre-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted);
    padding: 8px 18px;
    border-radius: 99px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: var(--transition);
  }

  .genre-btn:hover, .genre-btn.active {
    background: var(--text-main);
    color: black;
    border-color: var(--text-main);
  }

  /* ROWS & CAROUSELS */
  .content-row {
    margin-bottom: 40px;
    position: relative;
  }

  .row-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 15px;
    color: var(--text-main);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  .row-inner {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 15px 4px;
    scroll-behavior: smooth;
    scrollbar-width: none; 
    -ms-overflow-style: none;
  }

  .row-inner::-webkit-scrollbar {
    display: none;
  }

  .content-row {
    position: relative;
    margin-bottom: 30px;
  }

  .row-nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 45px;
    height: 100px;
    background: rgba(0,0,0,0.4);
    border: none;
    color: white;
    cursor: pointer;
    z-index: 10;
    opacity: 0;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }

  .content-row:hover .row-nav-btn {
    opacity: 1;
  }

  .row-nav-btn:hover {
    background: rgba(0,0,0,0.8);
    color: var(--netflix-red);
  }

  .row-nav-btn.prev { left: 0; border-radius: 0 4px 4px 0; }
  .row-nav-btn.next { right: 0; border-radius: 4px 0 0 4px; }

  .card {
    flex: 0 0 280px; 
    height: 158px;
    background: #1a1c20;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .card:hover {
    transform: scale(1.1);
    z-index: 100;
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
    border-color: rgba(255,255,255,0.3);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s ease;
  }

  .card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 30px 15px 15px;
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .card:hover .card-overlay {
    opacity: 1;
  }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .badge-original {
    background: #e50914;
    color: white;
    padding: 1px 5px;
    border-radius: 2px;
    font-weight: 900;
    font-size: 10px;
    text-transform: uppercase;
  }

  /* COMMON MODAL OVERLAY STYLES */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.active {
    display: flex;
    opacity: 1;
  }

  .modal-content {
    background: var(--bg-card);
    width: 90%;
    max-width: 1100px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    transform: scale(0.95);
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex;
    flex-direction: column;
    max-height: 90vh; /* ensure it fits on screen */
  }

  .modal-overlay.active .modal-content {
    transform: scale(1);
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #181818;
    border: 2px solid rgba(255,255,255,0.1);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    z-index: 100;
  }

  .modal-close:hover {
    background: rgba(255,255,255,0.2);
    border-color: white;
  }

  /* INFO MODAL SPECIFIC (Senior Dev Setup) */
  .info-hero {
    position: relative;
    width: 100%;
    height: 350px;
    background-size: cover;
    background-position: center;
  }
  
  .info-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, var(--bg-card) 0%, transparent 60%);
  }

  .info-details {
    padding: 30px 40px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
    overflow-y: auto;
  }

  .info-meta {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .match-score {
    color: #46d369;
    font-weight: 800;
  }

  .info-desc {
    font-size: 16px;
    line-height: 1.6;
    color: #e5e5e5;
  }

  .info-sidebar p {
    font-size: 14px;
    color: #777;
    margin-bottom: 12px;
  }
  
  .info-sidebar span.highlight {
    color: #d2d2d2;
  }

  /* VIDEO PLAYER MODAL SPECIFIC */
  .player-header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .player-title-area h2 {
    font-size: 22px;
    margin-bottom: 4px;
  }

  .server-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.5);
    max-height: 80px;
    overflow-y: auto;
  }

  .server-btn {
    flex: 0 0 auto;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    color: #ccc;
    padding: 4px 8px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    transition: 0.2s;
    white-space: nowrap;
  }

  .server-btn:hover {
    background: #333;
    border-color: rgba(255,255,255,0.3);
  }

  .server-btn.active {
    background: white;
    color: black;
    border-color: white;
  }

  .repair-btn {
    background: var(--netflix-red);
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 2px;
    font-size: 8px;
    font-weight: 900;
    cursor: pointer;
    margin-left: 5px;
    flex-shrink: 0;
  }

  .repair-btn:hover {
    background: #ff0000;
    transform: scale(1.05);
  }

  .iframe-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .player-loader {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: var(--netflix-red);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    position: absolute;
    z-index: 1;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .iframe-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 18px;
    grid-column: 1 / -1;
  }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    .nav-links { display: none; }
    .container { padding: 20px; }
    .search-input { width: 180px; }
    .hero-title { font-size: 32px; }
    .info-details { grid-template-columns: 1fr; }
    .main-brand-logo { 
       display: none; /* Hide center logo on mobile to prevent overlap */
    }
    .logo { font-size: 20px; }
  }
</style>
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <div class="nav-left">
      <div class="logo">Poteuxx</div>
      <nav class="nav-links">
        <a id="nav_home" class="active" onclick="setTypeFilter('all')" data-i18n="nav_home">Accueil</a>
        <a id="nav_series" onclick="setTypeFilter('series')" data-i18n="nav_series">Séries</a>
        <a id="nav_movies" onclick="setTypeFilter('movie')" data-i18n="nav_movies">Films</a>
      </nav>
    </div>
    
    <div class="main-brand-logo">SOLUTIONS<br><span>TECHNOLOGIES</span></div>
    
    <div class="nav-right">
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Rechercher..." data-i18n-placeholder="search_placeholder">
      </div>
      <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
    </div>
  </header>

  <!-- HERO SECTION -->
  <div class="hero" id="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="heroTitle">Chargement...</h1>
      <p class="hero-desc" id="heroDesc">Veuillez patienter...</p>
      <div style="display: flex; gap: 15px;">
        <button class="hero-btn" onclick="playHeroMovie()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <span data-i18n="btn_play">Lecture</span>
        </button>
        <button class="hero-btn hero-btn-secondary" onclick="infoHeroMovie()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          </svg>
          <span data-i18n="btn_info">Plus d'infos</span>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    <div class="genres" id="genreContainer">
      <!-- Genre buttons injected dynamically here -->
    </div>

    <div id="rowsContainer">
       <!-- Rows will be injected here -->
    </div>
    
    <div id="searchGrid" class="content-row" style="display:none; margin-top: 100px;">
        <h2 class="row-title">Résultats</h2>
        <div class="row-inner" id="searchInner" style="flex-wrap: wrap; overflow-x: visible;"></div>
    </div>
  </div>

  <!-- MORE INFO MODAL (Professional Overview) -->
  <div class="modal-overlay" id="infoModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeInfoModal()">×</button>
      
      <div class="info-hero" id="infoHeroBg" style="background-image: url('');">
        <!-- Overlay text could go here, but doing it below matches Netflix -->
      </div>
      
      <div class="info-details">
        <div>
          <h2 id="infoTitle" style="font-size: 32px; font-weight: 800; margin-bottom: 10px;">Movie Title</h2>
          <div class="info-meta">
            <span class="match-score">Recommandé à 98%</span>
            <span id="infoYear">2024</span>
            <span class="quality-badge" id="infoType">HD</span>
            <span class="quality-badge" style="border-color: #777;">5.1</span>
          </div>
          
          <button class="hero-btn" id="infoPlayBtn" style="margin-bottom: 25px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <span data-i18n="btn_play">Lecture</span>
          </button>
          
          <p class="info-desc" id="infoDesc">Description du film ici.</p>
        </div>
        
        <div class="info-sidebar">
           <p>Genre: <span class="highlight" id="infoGenres">Action, Sci-Fi</span></p>

  <script>
    /* =========================================
       I18N (BILINGUAL DICTIONARY)

    const translations = {

        section_movies: "Films D'Action & Récents",
        section_series: "Top Séries",
        label_server: "Serveur:",
        server_auto: "Automatique (HDSS)",
        no_results: "Aucun résultat trouvé pour votre recherche.",
        type_movie: "Film",
        type_series: "Série",

        Action: "Action",

        // Genres

        Animation: "Animation",
        Anime: "Anime",
        Comedy: "Comedy",
        Crime: "Crime",

    let currentLang = 'fr';

    function setLanguage(lang) {
      currentLang = lang;
      
      document.getElementById('langToggle').innerText = lang === 'fr' ? 'EN' : 'FR';
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          el.innerText = translations[lang][key];
        }
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (translations[lang][key]) {
          el.placeholder = translations[lang][key];
        }
      });

      updateSectionTitle();
      renderGenres();
      renderGrid();
      
      if(heroMovie) setHeroMovi(heroMovie); // Refresh hero text
    }

    function toggleLang() {
      setLanguage(currentLang === 'fr' ? 'en' : 'fr');
    }

    /* =========================================
       DYNAMIC HDSS SCRAPER (CORS PROXY)
       ========================================= */
    let contentDB = [];
    const proxy = 'https://api.allorigins.win/get?url=';
    const baseUrl = 'https://www.hdss.art';

    async function fetchCatalogData() {
      try {
        console.log("Fetching TMDB catalog...");
        document.getElementById('heroTitle').innerText = "Chargement Séries & Films...";
        
        const apiKey = "15d2ea6d0dc1d476efbca3eba2b9bbfb";
        
        
        let fetchPromises = [];
        for (let i = 1; i <= 6; i++) { // Fetch 6 pages of each category (~480 titles)
           fetchPromises.push(fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${apiKey}&language=fr-FR&page=${i}`).then(r => r.json()));
           fetchPromises.push(fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${apiKey}&language=fr-FR&page=${i}`).then(r => r.json()));
           fetchPromises.push(fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${apiKey}&language=fr-FR&page=${i}`).then(r => r.json()));
           fetchPromises.push(fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${apiKey}&language=fr-FR&page=${i}`).then(r => r.json()));
        }
        
        // Specific requests for must-have titles (like Family Guy)
        const specificTitles = ["Family Guy", "The Simpsons", "Rick and Morty", "South Park", "Braveheart", "Gladiator", "Matrix"];
        specificTitles.forEach(t => {
            fetchPromises.push(fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&language=fr-FR&query=${encodeURIComponent(t)}`).then(r => r.json()));
        });
        
        contentDB = [];
        const responses = await Promise.all(fetchPromises);
        
        let combined = [];
        const seenIds = new Set();
        
        responses.forEach(res => {
           if (res.results) {
              res.results.forEach(item => {
                 // TMDB IDs can overlap between movies and tv, use a compound key
                 const isMovie = item.title !== undefined;
                 const type = isMovie ? "movie" : "series";
                 const uniqueKey = `${type}_${item.id}`;
                 
                 const tmdbGenreMap = {
                    28: "Action", 12: "Adventure", 16: "Animation", 35: "Comedy", 80: "Crime",
                    99: "Documentary", 18: "Drama", 10751: "Family", 14: "Fantasy", 36: "History",
                    27: "Horror", 10402: "Music", 9648: "Mystery", 10749: "Romance", 878: "SciFi",
                    53: "Thriller", 10752: "War", 37: "Western", 10759: "Action", 10762: "Family", 
                    10765: "SciFi", 10768: "War"
                 };
                 
                 if (!seenIds.has(uniqueKey) && item.poster_path && item.backdrop_path) {
                    seenIds.add(uniqueKey);
                    
                    let mappedGenres = item.genre_ids ? item.genre_ids.map(id => tmdbGenreMap[id]).filter(Boolean) : [];
                    
                    if (mappedGenres.includes("Animation") && item.original_language === "ja") {
                         mappedGenres.push("Anime");
                         mappedGenres = mappedGenres.filter(g => g !== "Animation");
                    }
                    
                    if (mappedGenres.length === 0) mappedGenres = ["Action"];

                    combined.push({
                       id: contentDB.length + combined.length,
                       tmdbId: item.id,
                       type: type,
                       title: isMovie ? (item.title || item.original_title) : (item.name || item.original_name),
                       desc: { fr: item.overview || "Aucune description.", en: item.overview || "No description." },
                       genre: mappedGenres,
                       thumb: `https://image.tmdb.org/t/p/w500${item.poster_path}`,
                       backdrop: `https://image.tmdb.org/t/p/original${item.backdrop_path}`,
                       year: isMovie 
                          ? (item.release_date ? item.release_date.split('-')[0] : new Date().getFullYear())
                          : (item.first_air_date ? item.first_air_date.split('-')[0] : new Date().getFullYear()),
                       servers: { auto: null }
                    });
                 }
              });
           }
        });

        // Shuffle the array to mix movies and series
        combined = combined.sort(() => Math.random() - 0.5);
        contentDB = combined;

        if(contentDB.length > 0) {
          console.log(`Loaded ${contentDB.length} items from TMDB`);
          setHeroMovi(contentDB[0]);
          renderGenres();
          renderGrid();
        }

      } catch (err) {
        console.error("Catalog Fetch Error:", err);
        document.getElementById('heroDesc').innerText = "Erreur de connexion au catalogue (TMDB).";
      }
    }

    /* =========================================
       STATE & RENDER LOGIC
       ========================================= */
    let currentFilter = 'all'; // genre filter
    let currentTypeFilter = 'all'; // "all", "movie", "series"
    let searchQuery = '';
    let heroMovie = contentDB[0]; 
    let activeMovie = null; // Used for Video Player
    let isTrailerMuted = false; // Persistent state for sound preference

    function init() {
      setLanguage('fr');
      // Initially clear container
      const rows = document.getElementById('rowsContainer');
      if(rows) rows.innerHTML = '';
      fetchCatalogData();
    }

    let heroHoverTimeout;

    function setHeroMovi(item) {
      if(!item) return;
      heroMovie = item;
      const hero = document.getElementById('hero');
      hero.style.backgroundImage = `url('${item.backdrop}')`;
      document.getElementById('heroTitle').innerText = item.title;
      document.getElementById('heroDesc').innerText = item.desc[currentLang] || item.desc.fr;
      
      // Update sound indicator icon
      const soundBtn = document.createElement('div');
      soundBtn.className = 'sound-indicator';
      soundBtn.onclick = (e) => { e.stopPropagation(); toggleHeroVolume(); };
      updateSoundIcon(soundBtn);
      
      const oldInd = hero.querySelector('.sound-indicator');
      if(oldInd) oldInd.remove();
      hero.appendChild(soundBtn);
      
      const existingIframe = document.getElementById('heroTrailer');
      if(existingIframe) existingIframe.remove();
      clearTimeout(hero.trailerTimeout);

      const attemptPlay = (trailer) => {
          if (trailer) {
              hero.trailerTimeout = setTimeout(() => {
                   if (heroMovie.id === item.id) {
                       const iframe = document.createElement('iframe');
                       iframe.id = 'heroTrailer';
                       iframe.style.position = 'absolute';
                       iframe.style.inset = '-20%'; 
                       iframe.style.width = '140%';
                       iframe.style.height = '140%';
                       iframe.style.border = 'none';
                       iframe.style.zIndex = '1';
                       iframe.style.opacity = '0';
                       iframe.style.transition = 'opacity 1.5s ease';
                       iframe.style.pointerEvents = 'none'; 
                       
                       const muteVal = isTrailerMuted ? 1 : 0;
                       iframe.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=${muteVal}&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&loop=1&playlist=${trailer.key}`;
                       
                       iframe.onload = () => { iframe.style.opacity = '1'; };
                       hero.appendChild(iframe);
                   }
              }, 800); 
          }
      };

      // 1. Try French trailer first
      fetch(`https://api.themoviedb.org/3/${item.type}/${item.tmdbId}/videos?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb&language=fr-FR`)
        .then(res => res.json())
        .then(data => {
            let trailer = data.results && data.results.find(v => v.site === "YouTube" && v.type === "Trailer");
            if (!trailer && data.results && data.results.length > 0) trailer = data.results.find(v => v.site === "YouTube"); 
            
            if (trailer) {
                attemptPlay(trailer);
            } else {
                // 2. Fallback to English/International default
                fetch(`https://api.themoviedb.org/3/${item.type}/${item.tmdbId}/videos?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb`)
                    .then(res => res.json())
                    .then(data2 => {
                        let trailer2 = data2.results && data2.results.find(v => v.site === "YouTube" && v.type === "Trailer");
                        if (!trailer2 && data2.results && data2.results.length > 0) trailer2 = data2.results.find(v => v.site === "YouTube"); 
                        attemptPlay(trailer2);
                    }).catch(e => console.log(e));
            }
        }).catch(err => console.log("No trailer found", err));
    }

    function playHeroMovie() { 
      const existingIframe = document.getElementById('heroTrailer');
      if(existingIframe) existingIframe.remove();
      openPlayerModal(heroMovie); 
    }
    
    function toggleHeroVolume() {
        isTrailerMuted = !isTrailerMuted;
        const iframe = document.getElementById('heroTrailer');
        if(iframe) {
            let src = iframe.src;
            if(isTrailerMuted) {
                src = src.replace('mute=0', 'mute=1');
                if(!src.includes('mute=')) src += '&mute=1';
            } else {
                src = src.replace('mute=1', 'mute=0');
                if(!src.includes('mute=')) src += '&mute=0';
            }
            iframe.src = src;
        }
        updateSoundIcon();
    }

    function updateSoundIcon(btn) {
        const target = btn || document.querySelector('.sound-indicator');
        if(!target) return;
        if(isTrailerMuted) {
            target.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
        } else {
            target.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
        }
    }

    function infoHeroMovie() { openInfoModal(heroMovie); }

    // Navigation Tabs
    function setTypeFilter(type) {
      currentTypeFilter = type;
      
      // Update Navigation styling
      document.getElementById('nav_home').classList.remove('active');
      document.getElementById('nav_series').classList.remove('active');
      document.getElementById('nav_movies').classList.remove('active');
      
      if(type === 'all') document.getElementById('nav_home').classList.add('active');
      if(type === 'series') document.getElementById('nav_series').classList.add('active');
      if(type === 'movie') document.getElementById('nav_movies').classList.add('active');

      updateSectionTitle();
      renderGrid();
    }

    function updateSectionTitle() {
      const titleEl = document.getElementById('sectionTitle');
      if(!titleEl) return;
      if(currentTypeFilter === 'all') titleEl.innerText = translations[currentLang].section_trending;
      if(currentTypeFilter === 'movie') titleEl.innerText = translations[currentLang].section_movies;
      if(currentTypeFilter === 'series') titleEl.innerText = translations[currentLang].section_series;
    }

    // Genre Rendering
    function renderGenres() {
      const container = document.getElementById('genreContainer');
      const allBtnHTML = `<button class="genre-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setGenreFilter('all')">${translations[currentLang].genre_all}</button>`;
      
      const allGenres = new Set();
      contentDB.forEach(m => m.genre.forEach(g => allGenres.add(g)));
      
      let genresHTML = '';
      Array.from(allGenres).forEach(g => {
        const localizedName = translations[currentLang][g] || g;
        const isActive = currentFilter === g ? 'active' : '';
        genresHTML += `<button class="genre-btn ${isActive}" onclick="setGenreFilter('${g}')">${localizedName}</button>`;
      });

      container.innerHTML = allBtnHTML + genresHTML;
    }

    function setGenreFilter(genre) {
      currentFilter = genre;
      renderGenres(); 
      renderGrid();
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      const rows = document.getElementById('rowsContainer');
      const sGrid = document.getElementById('searchGrid');
      
      if(searchQuery.length > 0) {
          rows.style.display = 'none';
          document.getElementById('genreContainer').style.display = 'none';
          sGrid.style.display = 'block';
          renderSearchGrid();
      } else {
          rows.style.display = 'block';
          document.getElementById('genreContainer').style.display = 'flex';
          sGrid.style.display = 'none';
          renderRows();
      }
    });

    function renderSearchGrid() {
        const inner = document.getElementById('searchInner');
        inner.innerHTML = '';
        const filtered = contentDB.filter(item => item.title.toLowerCase().includes(searchQuery));
        if(filtered.length === 0) {
            inner.innerHTML = `<div class="no-results" style="width: 100%; text-align: center; padding: 40px;">${translations[currentLang].no_results}</div>`;
            return;
        }
        filtered.forEach(item => inner.appendChild(createCard(item)));
    }

    // Grid -> Rows Rendering
    function renderRows() {
      const container = document.getElementById('rowsContainer');
      container.innerHTML = '';

      if (currentFilter !== 'all') {
         // If a genre is selected, just show one row for that genre
         const filtered = contentDB.filter(item => item.genre.includes(currentFilter));
         container.appendChild(createRow(translations[currentLang][currentFilter] || currentFilter, filtered));
         return;
      }

      // Define standard rows
      const sections = [
          { title: translations[currentLang].section_trending, items: contentDB.slice(0, 40) },
          { title: "Animation & Adult Comedy", items: contentDB.filter(i => i.genre.includes('Animation') || i.genre.includes('Family')).slice(0, 40) },
          { title: translations[currentLang].nav_series, items: contentDB.filter(i => i.type === 'series').slice(0, 40) },
          { title: translations[currentLang].nav_movies, items: contentDB.filter(i => i.type === 'movie').slice(0, 40) },
          { title: translations[currentLang].Action, items: contentDB.filter(i => i.genre.includes('Action')).slice(0, 40) },
          { title: translations[currentLang].SciFi, items: contentDB.filter(i => i.genre.includes('SciFi')).slice(0, 40) },
          { title: "Horreur & Suspense", items: contentDB.filter(i => i.genre.includes('Horror') || i.genre.includes('Thriller')).slice(0, 40) },
          { title: translations[currentLang].Comedy, items: contentDB.filter(i => i.genre.includes('Comedy')).slice(0, 40) }
      ];

      sections.forEach(sec => {
          if(sec.items.length > 0) {
              container.appendChild(createRow(sec.title, sec.items));
          }
      });
    }

    function createRow(title, items) {
        const row = document.createElement('div');
        row.className = 'content-row';
        
        const titleEl = document.createElement('h2');
        titleEl.className = 'row-title';
        titleEl.innerText = title;
        
        const inner = document.createElement('div');
        inner.className = 'row-inner';
        
        const btnPrev = document.createElement('button');
        btnPrev.className = 'row-nav-btn prev';
        btnPrev.innerHTML = '&#10094;';
        btnPrev.onclick = () => { inner.scrollLeft -= 500; };
        
        const btnNext = document.createElement('button');
        btnNext.className = 'row-nav-btn next';
        btnNext.innerHTML = '&#10095;';
        btnNext.onclick = () => { inner.scrollLeft += 500; };
        
        items.forEach(item => {
            inner.appendChild(createCard(item));
        });
        
        row.appendChild(titleEl);
        row.appendChild(btnPrev);
        row.appendChild(inner);
        row.appendChild(btnNext);
        return row;
    }

    function createCard(item) {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openInfoModal(item);
        
        card.onmouseenter = () => {
             clearTimeout(heroHoverTimeout);
             heroHoverTimeout = setTimeout(() => {
                 if(heroMovie.id !== item.id) {
                     setHeroMovi(item);
                 }
             }, 350); 
        };
        card.onmouseleave = () => {
             clearTimeout(heroHoverTimeout);
        };

        card.innerHTML = `
          <img src="${item.backdrop || item.thumb}" alt="${item.title}" loading="lazy">
          <div class="card-overlay">
            <h3 class="card-title">${item.title}</h3>
            <div class="card-meta">
              <span class="badge-original">Studio</span>
              <span>${item.year}</span>
              <span>HD</span>
            </div>
          </div>
        `;
        return card;
    }

    // Replace the old renderGrid function
    function renderGrid() { renderRows(); }

    /* =========================================
       MORE INFO MODAL (Synopsis, Cast, Play)
       ========================================= */
    const infoModal = document.getElementById('infoModal');

    function openInfoModal(item) {
      document.getElementById('infoHeroBg').style.backgroundImage = `url('${item.backdrop}')`;
      document.getElementById('infoTitle').innerText = item.title;
      document.getElementById('infoYear').innerText = item.year;
      document.getElementById('infoDesc').innerText = item.desc[currentLang] || item.desc.fr;
      
      const typeKey = item.type === 'movie' ? 'type_movie' : 'type_series';
      document.getElementById('infoType').innerText = translations[currentLang][typeKey];
      document.getElementById('infoCategory').innerText = translations[currentLang][typeKey];

      const genreStr = item.genre.map(g => translations[currentLang][g] || g).join(', ');
      document.getElementById('infoGenres').innerText = genreStr;

      document.getElementById('infoPlayBtn').onclick = () => {
        closeInfoModal();
        setTimeout(() => openPlayerModal(item), 100);
      };

      infoModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeInfoModal() {
      infoModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    /* =========================================
       VIDEO PLAYER MODAL (Embed logic)
       ========================================= */
    const playerModal = document.getElementById('playerModal');
    const iframe = document.getElementById('playerIframe');

    async function openPlayerModal(item) {
      activeMovie = item;
      document.getElementById('playerTitle').innerText = item.title + " (Génération Sécurisée...)";
      playerModal.classList.add('active');
      document.body.style.overflow = 'hidden';

      if (!item.servers.auto || item.servers.auto === "error") {
        try {
            const tmdbId = item.tmdbId;
            
            // Construct robust, universally working players across multiple totally isolated hosts
            if (item.type === "series") {
               item.servers.vl = `https://frembed.pro/api/serie.php?id=${tmdbId}&s=1&e=1`;
               item.servers.vl2 = `https://autoembed.co/tv/tmdb/${tmdbId}?lang=fr`;
               item.servers.me = `https://vidsrc.me/embed/tv?tmdb=${tmdbId}`;
               item.servers.net = `https://vidsrc.net/embed/tv?tmdb=${tmdbId}`;
               item.servers.to = `https://vidsrc.to/embed/tv/${tmdbId}`;
               item.servers.cc = `https://vidsrc.cc/v2/embed/tv/${tmdbId}`;
               item.servers.pro = `https://vidsrc.pro/embed/tv/${tmdbId}`;
               item.servers.pm = `https://vidsrc.pm/embed/tv?tmdb=${tmdbId}`;
               item.servers.xyz = `https://vidsrc.xyz/embed/tv?tmdb=${tmdbId}`;
               item.servers.in = `https://vidsrc.in/embed/tv?tmdb=${tmdbId}`;
               item.servers.multiembed = `https://multiembed.mov/directstream.php?video_id=${tmdbId}&tmdb=1&s=1&e=1`;
               item.servers.vidlink = `https://vidlink.pro/tv/${tmdbId}/1/1`;
               item.servers.embedsu = `https://embed.su/embed/tv/${tmdbId}/1/1`;
               item.servers.twoembed = `https://2embed.cc/embedtv/${tmdbId}&s=1&e=1`;
               item.servers.smashy = `https://player.smashy.stream/tv?tmdb=${tmdbId}&s=1&e=1`;
               item.servers.vidbinge = `https://vidbinge.dev/embed/tv/${tmdbId}/1/1`;
               item.servers.gdrive = `https://database.gdriveplayer.us/player.php?type=series&tmdb=${tmdbId}&season=1&episode=1`;
               item.servers.autoembedto = `https://autoembed.to/tv/tmdb/${tmdbId}?lang=fr`;
               item.servers.vip = `https://vidsrc.vip/embed/tv/${tmdbId}`;
               item.servers.nl = `https://vidsrc.nl/embed/tv/${tmdbId}`;
               item.servers.darki = `https://darkiworld.com/embed/tv/${tmdbId}/1/1`;
            } else {
               item.servers.vl = `https://frembed.pro/api/film.php?id=${tmdbId}`;
               item.servers.vl2 = `https://autoembed.co/movie/tmdb/${tmdbId}?lang=fr`;
               item.servers.me = `https://vidsrc.me/embed/movie?tmdb=${tmdbId}`;
               item.servers.net = `https://vidsrc.net/embed/movie?tmdb=${tmdbId}`;
               item.servers.to = `https://vidsrc.to/embed/movie/${tmdbId}`;
               item.servers.cc = `https://vidsrc.cc/v2/embed/movie/${tmdbId}`;
               item.servers.pro = `https://vidsrc.pro/embed/movie/${tmdbId}`;
               item.servers.pm = `https://vidsrc.pm/embed/movie?tmdb=${tmdbId}`;
               item.servers.xyz = `https://vidsrc.xyz/embed/movie?tmdb=${tmdbId}`;
               item.servers.in = `https://vidsrc.in/embed/movie?tmdb=${tmdbId}`;
               item.servers.multiembed = `https://multiembed.mov/directstream.php?video_id=${tmdbId}&tmdb=1`;
               item.servers.vidlink = `https://vidlink.pro/movie/${tmdbId}`;
               item.servers.embedsu = `https://embed.su/embed/movie/${tmdbId}`;
               item.servers.twoembed = `https://2embed.cc/embed/${tmdbId}`;
               item.servers.smashy = `https://player.smashy.stream/movie?tmdb=${tmdbId}`;
               item.servers.vidbinge = `https://vidbinge.dev/embed/movie/${tmdbId}`;
               item.servers.gdrive = `https://database.gdriveplayer.us/player.php?tmdb=${tmdbId}`;
               item.servers.autoembedto = `https://autoembed.to/movie/tmdb/${tmdbId}?lang=fr`;
               item.servers.vip = `https://vidsrc.vip/embed/movie/${tmdbId}`;
               item.servers.nl = `https://vidsrc.nl/embed/movie/${tmdbId}`;
               item.servers.darki = `https://darkiworld.com/embed/movie/${tmdbId}`;
            }
            
            // Set default server
            item.servers.auto = item.servers.vl;
        } catch(e) {
           item.servers.auto = "error";
        }
      }

      document.getElementById('playerTitle').innerText = item.title;
      renderServerGrid();
      let iS = (activeMovie && activeMovie.genre.includes('Anime')) ? 'xyz' : (activeMovie && activeMovie.type === 'series' ? 'to' : 'vl'); updatePlayerSource(iS);
    }

    function closePlayerModal() {
      playerModal.classList.remove('active');
      document.body.style.overflow = '';
      
      // Stop media from playing in background
      setTimeout(() => {
        iframe.src = '';
        activeMovie = null;
      }, 300);
    }

    function changeServer() { let iS = (activeMovie && activeMovie.genre.includes('Anime')) ? 'xyz' : (activeMovie && activeMovie.type === 'series' ? 'to' : 'vl'); updatePlayerSource(iS); }

    function renderServerGrid() {
        const grid = document.getElementById('serverGrid');
        if(!grid) return;
        grid.innerHTML = '';
        
        const svs = [
            { id: 'vl', label: 'S1 • VF/VOST' },
            { id: 'vl2', label: 'S2 • AUTO FR' },
            { id: 'darki', label: 'S3 • EXCLU FR' },
            { id: 'autoembedto', label: 'S4 • FR/MULTI' },
            { id: 'xyz', label: 'S5 • VIDSRC.XYZ' },
            { id: 'icu', label: 'S6 • VIDSRC.ICU' },
            { id: 'su', label: 'S7 • VIDSRC.SU' },
            { id: 'me', label: 'S8 • VIDSRC.ME' },
            { id: 'to', label: 'S9 • VIDSRC.TO' },
            { id: 'link', label: 'S10 • VIDSRC.LINK' },
            { id: 'top', label: 'S11 • VIDSRC.TOP' },
            { id: 'super', label: 'S12 • SUPEREMBED' },
            { id: 'multiembed', label: 'S13 • MULTI' },
            { id: 'vidlink', label: 'S14 • VIDLINK' },
            { id: 'embedsu', label: 'S15 • EMBED.SU' },
            { id: 'smashy', label: 'S16 • SMASHY' }
        ];
        
        svs.forEach(s => {
            const btn = document.createElement('button');
            btn.className = `server-btn ${currentServer === s.id ? 'active' : ''}`;
            btn.innerText = s.label;
            btn.onclick = () => {
                updatePlayerSource(s.id);
            };
            grid.appendChild(btn);
        });
    }

    function autoRepairServer() {
        const priority = ['vl', 'vl2', 'darki', 'xyz', 'icu', 'su', 'link', 'top', 'super'];
        let idx = priority.indexOf(currentServer);
        updatePlayerSource(priority[(idx + 1) % priority.length]);
    }

    let currentServer = 'vl';
    
    function updatePlayerSource(serverId) {
      if(!activeMovie) return;
      currentServer = serverId || currentServer;
      
      const url = activeMovie.servers[currentServer] || activeMovie.servers.auto; 
      
      // Update UI active state
      document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = Array.from(document.querySelectorAll('.server-btn')).find(b => b.onclick.toString().includes(currentServer));
      if(activeBtn) activeBtn.classList.add('active');

      const loader = document.getElementById('playerLoader');
      if(loader) loader.style.display = 'block';

      if(url && (url.startsWith('http://') || url.startsWith('https://'))) {
         const pIframe = document.getElementById('playerIframe');
         pIframe.src = url;
         pIframe.onload = () => { if(loader) loader.style.display = 'none'; };
      } else {
         console.error("Invalid URL detected.");
         document.getElementById('playerIframe').src = '';
      }
      renderServerGrid(); // Re-render to update active state
    }

    // Close Modals on click outside
    infoModal.addEventListener('click', (e) => {
      if(e.target === infoModal) closeInfoModal();
    });
    
    playerModal.addEventListener('click', (e) => {
      if(e.target === playerModal) closePlayerModal();
    });

    // Start App
    init();

  </script>
</body>
</html>
