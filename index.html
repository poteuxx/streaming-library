<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poteuxx Streaming Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0b0c0f;
    --bg-card: #15181f;
    --bg-header: rgba(11, 12, 15, 0.85);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text-main: #ffffff;
    --text-muted: #94a3b8;
    --card-radius: 12px;
    --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
  }

  body {
    background: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CUSTOM SCROLLBAR */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-main); }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* HEADER / NAVBAR */
  header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: var(--bg-header);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
  }

  .nav-links {
    display: flex;
    gap: 20px;
  }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: var(--transition);
    cursor: pointer;
  }

  .nav-links a:hover, .nav-links a.active {
    color: var(--text-main);
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* SEARCH BARR */
  .search-container {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 8px 16px 8px 36px;
    border-radius: 99px;
    font-size: 14px;
    width: 250px;
    outline: none;
    transition: var(--transition);
  }

  .search-input:focus {
    background: rgba(255,255,255,0.12);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
  }

  .search-icon {
    position: absolute;
    left: 12px;
    width: 16px;
    height: 16px;
    fill: var(--text-muted);
  }

  /* LANGUAGE TOGGLE */
  .lang-toggle {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: var(--transition);
  }
  
  .lang-toggle:hover {
    background: rgba(255,255,255,0.2);
  }

  /* HERO SECTION */
  .hero {
    position: relative;
    width: 100%;
    height: 70vh;
    min-height: 500px;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-end;
    padding: 80px 40px;
    transition: background-image 0.5s ease;
  }

  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, var(--bg-main) 0%, rgba(11,12,15,0.4) 50%, rgba(11,12,15,0.8) 100%);
  }

  .hero-content {
    position: relative;
    z-index: 10;
    max-width: 600px;
  }

  .hero-title {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 15px;
    text-shadow: 0 4px 12px rgba(0,0,0,0.5);
  }

  .hero-desc {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 25px;
    line-height: 1.5;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .hero-btn {
    background: var(--text-main);
    color: black;
    border: none;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
  }

  .hero-btn:hover {
    background: rgba(255,255,255,0.8);
    transform: scale(1.05);
  }

  .hero-btn-secondary {
    background: rgba(109, 109, 110, 0.7);
    color: white;
  }
  .hero-btn-secondary:hover {
    background: rgba(109, 109, 110, 0.4);
  }

  /* MAIN CONTAINER */
  .container {
    padding: 20px 40px 60px;
    position: relative;
    z-index: 5;
    margin-top: -80px;
  }

  /* GENRE FILTERS */
  .genres {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .genre-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted);
    padding: 8px 18px;
    border-radius: 99px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: var(--transition);
  }

  .genre-btn:hover, .genre-btn.active {
    background: var(--text-main);
    color: black;
    border-color: var(--text-main);
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* MOVIE CARD */
  .card {
    background: var(--bg-card);
    border-radius: var(--card-radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: var(--transition);
    aspect-ratio: 16 / 9;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .card:hover {
    transform: scale(1.05) translateY(-5px);
    z-index: 10;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s;
  }

  .card .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 60%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 15px;
  }

  .card:hover .card-overlay {
    opacity: 1;
  }

  .card-title {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .quality-badge {
    border: 1px solid rgba(255,255,255,0.5);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 9px;
  }

  /* COMMON MODAL OVERLAY STYLES */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.active {
    display: flex;
    opacity: 1;
  }

  .modal-content {
    background: var(--bg-card);
    width: 90%;
    max-width: 1100px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    transform: scale(0.95);
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex;
    flex-direction: column;
    max-height: 90vh; /* ensure it fits on screen */
  }

  .modal-overlay.active .modal-content {
    transform: scale(1);
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #181818;
    border: 2px solid rgba(255,255,255,0.1);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    z-index: 100;
  }

  .modal-close:hover {
    background: rgba(255,255,255,0.2);
    border-color: white;
  }

  /* INFO MODAL SPECIFIC (Senior Dev Setup) */
  .info-hero {
    position: relative;
    width: 100%;
    height: 350px;
    background-size: cover;
    background-position: center;
  }
  
  .info-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, var(--bg-card) 0%, transparent 60%);
  }

  .info-details {
    padding: 30px 40px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
    overflow-y: auto;
  }

  .info-meta {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .match-score {
    color: #46d369;
    font-weight: 800;
  }

  .info-desc {
    font-size: 16px;
    line-height: 1.6;
    color: #e5e5e5;
  }

  .info-sidebar p {
    font-size: 14px;
    color: #777;
    margin-bottom: 12px;
  }
  
  .info-sidebar span.highlight {
    color: #d2d2d2;
  }

  /* VIDEO PLAYER MODAL SPECIFIC */
  .player-header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .player-title-area h2 {
    font-size: 22px;
    margin-bottom: 4px;
  }

  .server-selector {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .server-selector label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .server-select {
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }

  .iframe-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    position: relative;
  }

  .iframe-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 18px;
    grid-column: 1 / -1;
  }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    .nav-links { display: none; }
    .container { padding: 20px; }
    .search-input { width: 180px; }
    .hero-title { font-size: 32px; }
    .info-details { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <div class="nav-left">
      <div class="logo">Poteuxx</div>
      <nav class="nav-links">
        <a id="nav_home" class="active" onclick="setTypeFilter('all')" data-i18n="nav_home">Accueil</a>
        <a id="nav_series" onclick="setTypeFilter('series')" data-i18n="nav_series">Séries</a>
        <a id="nav_movies" onclick="setTypeFilter('movie')" data-i18n="nav_movies">Films</a>
      </nav>
    </div>
    
    <div class="nav-right">
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Rechercher..." data-i18n-placeholder="search_placeholder">
      </div>
      <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
    </div>
  </header>

  <!-- HERO SECTION -->
  <div class="hero" id="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="heroTitle">Chargement...</h1>
      <p class="hero-desc" id="heroDesc">Veuillez patienter...</p>
      <div style="display: flex; gap: 15px;">
        <button class="hero-btn" onclick="playHeroMovie()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <span data-i18n="btn_play">Lecture</span>
        </button>
        <button class="hero-btn hero-btn-secondary" onclick="infoHeroMovie()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          </svg>
          <span data-i18n="btn_info">Plus d'infos</span>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    
    <div class="genres" id="genreContainer">
      <button class="genre-btn active" data-genre="all" data-i18n="genre_all">Tous</button>
      <!-- Genre buttons injected dynamically here -->
    </div>

    <h2 class="section-title" id="sectionTitle" data-i18n="section_trending">Tendances Actuelles</h2>
    
    <div class="grid" id="grid">
      <!-- Movie cards injected dynamically here -->
    </div>
  </div>

  <!-- MORE INFO MODAL (Professional Overview) -->
  <div class="modal-overlay" id="infoModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeInfoModal()">×</button>
      
      <div class="info-hero" id="infoHeroBg" style="background-image: url('');">
        <!-- Overlay text could go here, but doing it below matches Netflix -->
      </div>
      
      <div class="info-details">
        <div>
          <h2 id="infoTitle" style="font-size: 32px; font-weight: 800; margin-bottom: 10px;">Movie Title</h2>
          <div class="info-meta">
            <span class="match-score">Recommandé à 98%</span>
            <span id="infoYear">2024</span>
            <span class="quality-badge" id="infoType">HD</span>
            <span class="quality-badge" style="border-color: #777;">5.1</span>
          </div>
          
          <button class="hero-btn" id="infoPlayBtn" style="margin-bottom: 25px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <span data-i18n="btn_play">Lecture</span>
          </button>
          
          <p class="info-desc" id="infoDesc">Description du film ici.</p>
        </div>
        
        <div class="info-sidebar">
           <p>Genre: <span class="highlight" id="infoGenres">Action, Sci-Fi</span></p>
           <p>Source HDSS: <span class="highlight">Vérifiée</span></p>
           <p>Catégorie: <span class="highlight" id="infoCategory">Film</span></p>
        </div>
      </div>
    </div>
  </div>

  <!-- SECURE VIDEO MODAL -->
  <div class="modal-overlay" id="playerModal">
    <div class="modal-content">
      
      <div class="player-header">
        <div class="player-title-area">
          <h2 id="playerTitle">Film Title</h2>
          <div class="server-selector">
            <label for="serverSelect" data-i18n="label_server">Serveur:</label>
            <select id="serverSelect" class="server-select" onchange="changeServer()">
              <option value="cc" data-i18n="server_auto">Serveur 1 (Vidsrc.cc)</option>
              <option value="me">Serveur 2 (VidSrc.me)</option>
              <option value="ae">Serveur 3 (AutoEmbed)</option>
              <option value="net">Serveur 4 (Vidsrc.net)</option>
              <option value="to">Serveur 5 (Vidsrc.to)</option>
            </select>
          </div>
        </div>
        <button class="modal-close" style="position: static;" onclick="closePlayerModal()">×</button>
      </div>

      <div class="iframe-container">
        <!-- Sandbox removed: Streaming providers actively block playback if a sandbox is detected -->
        <iframe id="playerIframe" 
                allowfullscreen 
                src="">
        </iframe>
      </div>

    </div>
  </div>

  <script>
    /* =========================================
       I18N (BILINGUAL DICTIONARY)
       ========================================= */
    const translations = {
      fr: {
        nav_home: "Accueil",
        nav_series: "Séries",
        nav_movies: "Films",
        search_placeholder: "Rechercher...",
        btn_play: "Lecture",
        btn_info: "Plus d'infos",
        genre_all: "Tous",
        section_trending: "Tendances Actuelles",
        section_movies: "Films D'Action & Récents",
        section_series: "Top Séries",
        label_server: "Serveur:",
        server_auto: "Automatique (HDSS)",
        no_results: "Aucun résultat trouvé pour votre recherche.",
        type_movie: "Film",
        type_series: "Série",
        // Genres
        Action: "Action",
        Comedy: "Comédie",
        Drama: "Drame",
        SciFi: "Sci-Fi",
        Horror: "Horreur",
        Animation: "Animation"
      },
      en: {
        nav_home: "Home",
        nav_series: "Series",
        nav_movies: "Movies",
        search_placeholder: "Search...",
        btn_play: "Play",
        btn_info: "More Info",
        genre_all: "All",
        section_trending: "Trending Now",
        section_movies: "Action & New Movies",
        section_series: "Top Series",
        label_server: "Server:",
        server_auto: "Auto (HDSS)",
        no_results: "No results found for your search.",
        type_movie: "Movie",
        type_series: "Series",
        // Genres
        Action: "Action",
        Comedy: "Comedy",
        Drama: "Drama",
        SciFi: "Sci-Fi",
        Horror: "Horror",
        Animation: "Animation"
      }
    };

    let currentLang = 'fr';

    function setLanguage(lang) {
      currentLang = lang;
      
      document.getElementById('langToggle').innerText = lang === 'fr' ? 'EN' : 'FR';
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          el.innerText = translations[lang][key];
        }
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (translations[lang][key]) {
          el.placeholder = translations[lang][key];
        }
      });

      updateSectionTitle();
      renderGenres();
      renderGrid();
      
      if(heroMovie) setHeroMovi(heroMovie); // Refresh hero text
    }

    function toggleLang() {
      setLanguage(currentLang === 'fr' ? 'en' : 'fr');
    }

    /* =========================================
       DYNAMIC HDSS SCRAPER (CORS PROXY)
       ========================================= */
    let contentDB = [];
    const proxy = 'https://api.allorigins.win/get?url=';
    const baseUrl = 'https://www.hdss.art';

    async function fetchHDSSData() {
      try {
        console.log("Fetching HDSS full catalog...");
        document.getElementById('heroTitle').innerText = "Chargement Séries & Films HDSS...";
        
        const urlsToScrape = [
           'https://www.hdss.art/films/',
           'https://www.hdss.art/series/'
        ];
        
        contentDB = [];
        const parser = new DOMParser();

        for (let url of urlsToScrape) {
          try {
            const response = await fetch(proxy + encodeURIComponent(url));
            const data = await response.json();
            const doc = parser.parseFromString(data.contents, 'text/html');
            const articles = doc.querySelectorAll('article.short-item');
            
            articles.forEach((art) => {
              const a = art.querySelector('a.short-item__img');
              const img = art.querySelector('img');
              const title = art.querySelector('h3.short-item__title');
              
              if(a && img && title) {
                let imgUrl = img.getAttribute('src');
                if(imgUrl.startsWith('/')) imgUrl = baseUrl + imgUrl;
                
                let linkUrl = a.getAttribute('href');
                if(linkUrl.startsWith('/')) linkUrl = baseUrl + linkUrl;

                let type = url.includes('/series/') ? "series" : "movie";

                contentDB.push({
                  id: contentDB.length,
                  type: type,
                  title: title.innerText.trim(),
                  desc: { fr: "Profitez du contenu complet sans interruption.", en: "Enjoy full content uninterrupted." },
                  genre: ["Action"], 
                  thumb: imgUrl,
                  backdrop: imgUrl, 
                  link: linkUrl,
                  year: new Date().getFullYear(),
                  servers: { auto: null }
                });
              }
            });
          } catch(e) {
            console.error("Erreur lors de la pagination:", url);
          }
        }

        if(contentDB.length > 0) {
          console.log(`Loaded ${contentDB.length} items from HDSS`);
          // Shuffle slightly to mix series and films if we want, or keep order.
          setHeroMovi(contentDB[0]);
          renderGenres();
          renderGrid();
        }

      } catch (err) {
        console.error("HDSS Scrape Error:", err);
        document.getElementById('heroDesc').innerText = "Erreur proxy HDSS.";
      }
    }

    /* =========================================
       STATE & RENDER LOGIC
       ========================================= */
    let currentFilter = 'all'; // genre filter
    let currentTypeFilter = 'all'; // "all", "movie", "series"
    let searchQuery = '';
    let heroMovie = contentDB[0]; 
    let activeMovie = null; // Used for Video Player

    function init() {
      setLanguage('fr');
      // Initially clear grid
      document.getElementById('grid').innerHTML = '';
      fetchHDSSData();
    }

    function setHeroMovi(item) {
      if(!item) return;
      heroMovie = item;
      document.getElementById('hero').style.backgroundImage = `url('${item.backdrop}')`;
      document.getElementById('heroTitle').innerText = item.title;
      document.getElementById('heroDesc').innerText = item.desc[currentLang] || item.desc.fr;
    }

    function playHeroMovie() { openPlayerModal(heroMovie); }
    function infoHeroMovie() { openInfoModal(heroMovie); }

    // Navigation Tabs
    function setTypeFilter(type) {
      currentTypeFilter = type;
      
      // Update Navigation styling
      document.getElementById('nav_home').classList.remove('active');
      document.getElementById('nav_series').classList.remove('active');
      document.getElementById('nav_movies').classList.remove('active');
      
      if(type === 'all') document.getElementById('nav_home').classList.add('active');
      if(type === 'series') document.getElementById('nav_series').classList.add('active');
      if(type === 'movie') document.getElementById('nav_movies').classList.add('active');

      updateSectionTitle();
      renderGrid();
    }

    function updateSectionTitle() {
      const titleEl = document.getElementById('sectionTitle');
      if(currentTypeFilter === 'all') titleEl.innerText = translations[currentLang].section_trending;
      if(currentTypeFilter === 'movie') titleEl.innerText = translations[currentLang].section_movies;
      if(currentTypeFilter === 'series') titleEl.innerText = translations[currentLang].section_series;
    }

    // Genre Rendering
    function renderGenres() {
      const container = document.getElementById('genreContainer');
      const allBtnHTML = `<button class="genre-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setGenreFilter('all')">${translations[currentLang].genre_all}</button>`;
      
      const allGenres = new Set();
      contentDB.forEach(m => m.genre.forEach(g => allGenres.add(g)));
      
      let genresHTML = '';
      Array.from(allGenres).forEach(g => {
        const localizedName = translations[currentLang][g] || g;
        const isActive = currentFilter === g ? 'active' : '';
        genresHTML += `<button class="genre-btn ${isActive}" onclick="setGenreFilter('${g}')">${localizedName}</button>`;
      });

      container.innerHTML = allBtnHTML + genresHTML;
    }

    function setGenreFilter(genre) {
      currentFilter = genre;
      renderGenres(); 
      renderGrid();
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      renderGrid();
    });

    // Grid Rendering
    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      const filtered = contentDB.filter(item => {
        const matchesType = currentTypeFilter === 'all' || item.type === currentTypeFilter;
        const matchesGenre = currentFilter === 'all' || item.genre.includes(currentFilter);
        const matchesSearch = item.title.toLowerCase().includes(searchQuery);
        return matchesType && matchesGenre && matchesSearch;
      });

      if(filtered.length === 0) {
        grid.innerHTML = `<div class="no-results">${translations[currentLang].no_results}</div>`;
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openInfoModal(item);
        
        let genreStr = item.genre.map(g => translations[currentLang][g] || g).join(' • ');

        card.innerHTML = `
          <img src="${item.thumb}" alt="${item.title}" loading="lazy">
          <div class="card-overlay">
            <h3 class="card-title">${item.title}</h3>
            <div class="card-meta">
              <span class="quality-badge">HDSS</span>
              <span>${item.year}</span>
              <span>${genreStr}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    /* =========================================
       MORE INFO MODAL (Synopsis, Cast, Play)
       ========================================= */
    const infoModal = document.getElementById('infoModal');

    function openInfoModal(item) {
      document.getElementById('infoHeroBg').style.backgroundImage = `url('${item.backdrop}')`;
      document.getElementById('infoTitle').innerText = item.title;
      document.getElementById('infoYear').innerText = item.year;
      document.getElementById('infoDesc').innerText = item.desc[currentLang] || item.desc.fr;
      
      const typeKey = item.type === 'movie' ? 'type_movie' : 'type_series';
      document.getElementById('infoType').innerText = translations[currentLang][typeKey];
      document.getElementById('infoCategory').innerText = translations[currentLang][typeKey];

      const genreStr = item.genre.map(g => translations[currentLang][g] || g).join(', ');
      document.getElementById('infoGenres').innerText = genreStr;

      document.getElementById('infoPlayBtn').onclick = () => {
        closeInfoModal();
        setTimeout(() => openPlayerModal(item), 100);
      };

      infoModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeInfoModal() {
      infoModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    /* =========================================
       VIDEO PLAYER MODAL (Embed logic)
       ========================================= */
    const playerModal = document.getElementById('playerModal');
    const iframe = document.getElementById('playerIframe');
    const serverSelect = document.getElementById('serverSelect');

    async function openPlayerModal(item) {
      activeMovie = item;
      document.getElementById('playerTitle').innerText = item.title + " (Génération Sécurisée...)";
      playerModal.classList.add('active');
      document.body.style.overflow = 'hidden';

      if (!item.servers.auto || item.servers.auto === "error") {
        try {
          // By API mapping the scraped HDSS title, we guarantee a working iframe from an external source!
          const tmdbRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb&query=${encodeURIComponent(item.title)}&language=fr-FR`);
          const tmdbData = await tmdbRes.json();
          
          if(tmdbData.results && tmdbData.results.length > 0) {
            const match = tmdbData.results[0]; // first best match
            const tmdbId = match.id;
            
            // Construct robust, universally working players across multiple totally isolated hosts
            if (item.type === "series" || match.media_type === "tv") {
               item.servers.cc = `https://vidsrc.cc/v2/embed/tv/${tmdbId}/1/1`;
               item.servers.me = `https://vidsrc.me/embed/tv?tmdb=${tmdbId}&season=1&episode=1`;
               item.servers.ae = `https://autoembed.to/tv/tmdb/${tmdbId}-1-1`;
               item.servers.net = `https://vidsrc.net/embed/tv?tmdb=${tmdbId}&season=1&episode=1`;
               item.servers.to = `https://vidsrc.to/embed/tv/${tmdbId}/1/1`;
            } else {
               item.servers.cc = `https://vidsrc.cc/v2/embed/movie/${tmdbId}`;
               item.servers.me = `https://vidsrc.me/embed/movie?tmdb=${tmdbId}`;
               item.servers.ae = `https://autoembed.to/movie/tmdb/${tmdbId}`;
               item.servers.net = `https://vidsrc.net/embed/movie?tmdb=${tmdbId}`;
               item.servers.to = `https://vidsrc.to/embed/movie/${tmdbId}`;
            }
            
            // Set default server to cc
            item.servers.auto = item.servers.cc;
          } else {
             item.servers.auto = "error";
          }
        } catch(e) {
           item.servers.auto = "error";
        }
      }

      document.getElementById('playerTitle').innerText = item.title;
      serverSelect.value = 'cc';
      updatePlayerSource();
    }

    function closePlayerModal() {
      playerModal.classList.remove('active');
      document.body.style.overflow = '';
      
      // Stop media from playing in background
      setTimeout(() => {
        iframe.src = '';
        activeMovie = null;
      }, 300);
    }

    function changeServer() { updatePlayerSource(); }

    function updatePlayerSource() {
      if(!activeMovie) return;
      const sv = serverSelect.value;
      const url = activeMovie.servers[sv] || activeMovie.servers.auto; 
      
      if(url && (url.startsWith('http://') || url.startsWith('https://'))) {
         iframe.src = url;
      } else {
         console.error("Invalid URL detected.");
         iframe.src = '';
      }
    }

    // Close Modals on click outside
    infoModal.addEventListener('click', (e) => {
      if(e.target === infoModal) closeInfoModal();
    });
    
    playerModal.addEventListener('click', (e) => {
      if(e.target === playerModal) closePlayerModal();
    });

    // Start App
    init();

  </script>
</body>
</html>
